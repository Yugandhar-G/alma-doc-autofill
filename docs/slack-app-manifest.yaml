# yunaki Slack app manifest (Socket Mode)
# Create/update the app from this file at https://api.slack.com/apps
# Schema verified against https://docs.slack.dev/reference/app-manifest (July 2026)
_metadata:
  major_version: 1
  minor_version: 1

display_information:
  name: yunaki
  description: Assign tasks to yunaki by mentioning it in a channel.
  background_color: "#1a1a1a"

features:
  # Agents & AI Apps: lets the bot use assistant.threads.setStatus — Slack
  # renders the native shimmering "Thinking…" row while the agent works
  # (no message edits, no "(edited)" tag).
  assistant_view: true
  bot_user:
    display_name: yunaki
    always_online: true
  slash_commands:
    - command: /yunaki
      description: Case status and yunaki controls
      usage_hint: status <case>
      should_escape: false

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - assistant:write
      - chat:write
      - reactions:write
      - channels:history
      - groups:history
      - commands

settings:
  event_subscriptions:
    # No request_url: Socket Mode delivers events over a WebSocket, not HTTP.
    bot_events:
      - app_mention
      - message.channels
      - message.groups
  interactivity:
    # Approvals are Block Kit buttons ([Approve] [Edit] [Reject]); Edit opens a modal.
    # No request_url: Socket Mode delivers interaction payloads over the WebSocket.
    is_enabled: true
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
